<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earthgirl &amp; Airboy</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0f1a;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }

      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Phaser injects its <canvas> here. Center it nicely. */
      #game-container canvas {
        display: block;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
